services:
  # ─── Infrastructure ───────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-savidhi}
      POSTGRES_USER: ${POSTGRES_USER:-savidhi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-savidhi_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - savidhi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-savidhi_user} -d ${POSTGRES_DB:-savidhi}"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    networks:
      - savidhi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Microservices ────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
      target: development
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4001
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB:-savidhi}
      DB_USER: ${POSTGRES_USER:-savidhi_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-savidhi_password}
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-changeme_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_refresh}
      JWT_ACCESS_EXPIRES: 1h
      JWT_REFRESH_EXPIRES: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001,http://localhost:3002,http://localhost:8081}
    depends_on:
      - postgres
      - redis
    networks:
      - savidhi-network
    volumes:
      - ./services/auth-service:/app
      - ./lib:/app/lib:ro
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
      target: development
    ports:
      - "4002:4002"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4002
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB:-savidhi}
      DB_USER: ${POSTGRES_USER:-savidhi_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-savidhi_password}
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:4001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001,http://localhost:3002,http://localhost:8081}
    depends_on:
      - postgres
      - redis
      - auth-service
    networks:
      - savidhi-network
    volumes:
      - ./services/user-service:/app
      - ./lib:/app/lib:ro
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
      target: development
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:4001
      USER_SERVICE_URL: http://user-service:4002
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001,http://localhost:3002,http://localhost:8081}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      API_VERSION: v1
    depends_on:
      - auth-service
      - user-service
    networks:
      - savidhi-network
    volumes:
      - ./services/gateway-service:/app
      - ./lib:/app/lib:ro
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  savidhi-network:
    driver: bridge
