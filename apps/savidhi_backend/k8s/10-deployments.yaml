            - secretRef: { name: savidhi-env }
          env:
            - { name: PORT, value: "4005" }
          readinessProbe: { httpGet: { path: /health, port: 4005 }, initialDelaySeconds: 5 }
          resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: 500m, memory: 512Mi } }
---
apiVersion: v1
kind: Service
metadata: { name: media-service, namespace: savidhi }
spec: { type: ClusterIP, selector: { app: media-service }, ports: [{ port: 4005, targetPort: 4005 }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: media-service-hpa, namespace: savidhi }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: media-service }
