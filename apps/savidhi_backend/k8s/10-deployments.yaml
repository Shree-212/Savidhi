# All 7 microservices: Deployment + Service + HorizontalPodAutoscaler.
# Image references use Artifact Registry. Update :v1 → :v2, :v3 etc on each release.
---
# ─── gateway-service (port 4000) ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: savidhi
spec:
  replicas: 2
  selector:
    matchLabels: { app: gateway-service }
  template:
    metadata:
      labels: { app: gateway-service }
    spec:
      serviceAccountName: savidhi-eso
      containers:
        - name: gateway
          image: asia-south1-docker.pkg.dev/savidhi-prod/savidhi/gateway-service:v2
          ports: [{ containerPort: 4000 }]
          envFrom:
            - configMapRef: { name: savidhi-config }
            - secretRef: { name: savidhi-env }
          env:
            - name: PORT
              value: "4000"
          readinessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 30
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: savidhi
  annotations:
    cloud.google.com/backend-config: '{"default":"gateway-backend"}'
spec:
  type: ClusterIP
  selector: { app: gateway-service }
  ports:
    - { port: 4000, targetPort: 4000, name: http }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-service-hpa
  namespace: savidhi
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: gateway-service }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
