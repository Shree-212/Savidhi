# ─── media-service (4005) ────────────────────────────────────────────────────
# Stateless: uploads stream straight from multer memory buffer into the public
# GCS bucket (savidhi-media-prod) via lib/gcs.ts. No PVC, no local-disk
# emptyDir, scales freely.
apiVersion: apps/v1
kind: Deployment
metadata: { name: media-service, namespace: savidhi }
spec:
  replicas: 2
  selector:
    matchLabels: { app: media-service }
  template:
    metadata:
      labels: { app: media-service }
    spec:
      serviceAccountName: savidhi-eso
