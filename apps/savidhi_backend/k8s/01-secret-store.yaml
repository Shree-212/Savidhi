# External Secrets Operator wiring.
# Pre-req: install ESO once per cluster:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# Pre-req: workload identity binding so the SA can read Secret Manager:
#   gcloud iam service-accounts add-iam-policy-binding \
#     savidhi-eso@savidhi-prod.iam.gserviceaccount.com \
#     --role=roles/iam.workloadIdentityUser \
#     --member="serviceAccount:savidhi-prod.svc.id.goog[savidhi/savidhi-eso]"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: savidhi-eso
  namespace: savidhi
  annotations:
    iam.gke.io/gcp-service-account: savidhi-eso@savidhi-prod.iam.gserviceaccount.com
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-savidhi-prod
spec:
  provider:
    gcpsm:
      projectID: savidhi-prod
      auth:
        workloadIdentity:
          clusterLocation: asia-south1
          clusterName: savidhi-gke
          serviceAccountRef:
            name: savidhi-eso
            namespace: savidhi
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: savidhi-env
  namespace: savidhi
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: gcp-savidhi-prod
    kind: ClusterSecretStore
  target:
    name: savidhi-env
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef: { key: db-url }
    - secretKey: REDIS_URL
      remoteRef: { key: redis-url }
    - secretKey: JWT_ACCESS_SECRET
      remoteRef: { key: jwt-access-secret }
    - secretKey: JWT_REFRESH_SECRET
      remoteRef: { key: jwt-refresh-secret }
    - secretKey: RAZORPAY_KEY_ID
      remoteRef: { key: razorpay-key-id }
    - secretKey: RAZORPAY_KEY_SECRET
      remoteRef: { key: razorpay-key-secret }
    - secretKey: RAZORPAY_WEBHOOK_SECRET
      remoteRef: { key: razorpay-webhook-secret }
    - secretKey: TWILIO_ACCOUNT_SID
      remoteRef: { key: twilio-account-sid }
    - secretKey: TWILIO_AUTH_TOKEN
      remoteRef: { key: twilio-auth-token }
    - secretKey: TWILIO_VERIFY_SERVICE_SID
      remoteRef: { key: twilio-verify-service-sid }
    - secretKey: PROKERALA_CLIENT_ID
      remoteRef: { key: prokerala-client-id }
    - secretKey: PROKERALA_CLIENT_SECRET
      remoteRef: { key: prokerala-client-secret }
