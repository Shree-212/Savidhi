# Non-secret env shared across the 7 services.
apiVersion: v1
kind: ConfigMap
metadata:
  name: savidhi-config
  namespace: savidhi
data:
  NODE_ENV: production
  AUTH_SERVICE_URL: http://auth-service:4001
  USER_SERVICE_URL: http://user-service:4002
  CATALOG_SERVICE_URL: http://catalog-service:4003
  BOOKING_SERVICE_URL: http://booking-service:4004
  MEDIA_SERVICE_URL: http://media-service:4005
  NOTIFICATION_SERVICE_URL: http://notification-service:4006
  CORS_ORIGIN: https://savidhi.in,https://www.savidhi.in,https://admin.savidhi.in,https://savidhi.com,https://www.savidhi.com,https://savidhi.org,https://www.savidhi.org
  AUTH_COOKIE_DOMAIN: .savidhi.in
  GCS_MEDIA_BUCKET: savidhi-media-prod
  GCS_UPLOAD_BUCKET: savidhi-uploads-prod
  JWT_ACCESS_EXPIRES: 30m
  JWT_REFRESH_EXPIRES: 7d
  # The booking-service runs autocomplete via CronJob in prod, not in-process.
  RUN_AUTOCOMPLETE_WORKER: "false"
