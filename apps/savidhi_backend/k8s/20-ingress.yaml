# GKE Ingress for api.savidhi.in → gateway-service:4000.
# Pre-req: reserve a global static IP and a managed certificate before applying:
#   gcloud compute addresses create savidhi-api-ip --global
#   (then point api.savidhi.in A-record at that IP)
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: savidhi-api-cert
  namespace: savidhi
spec:
  domains:
    - api.savidhi.in
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: gateway-backend
  namespace: savidhi
spec:
  healthCheck:
    type: HTTP
    requestPath: /health
    port: 4000
  timeoutSec: 60
  connectionDraining:
    drainingTimeoutSec: 30
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: savidhi-api
  namespace: savidhi
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "savidhi-api-ip"
    networking.gke.io/managed-certificates: "savidhi-api-cert"
    kubernetes.io/ingress.allow-http: "false"
spec:
  rules:
    - host: api.savidhi.in
      http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: gateway-service
                port:
                  number: 4000
